<!DOCTYPE html>
<html>
<head>

<title>AriTrade Exchange</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
margin:0;
}

header{
background:#111;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
margin-top:30px;
}

button{
padding:14px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.buy{
background:#00c853;
color:white;
}

.sell{
background:#ff1744;
color:white;
}

.copy{
background:#2962ff;
color:white;
}

.box{
background:#1b1b1b;
padding:20px;
margin:20px auto;
border-radius:10px;
width:320px;
box-shadow:0px 0px 10px #000;
}

input{
padding:10px;
width:85%;
margin:6px;
border-radius:6px;
border:none;
}

#qrcode{
margin-top:20px;
}

.notice{
color:#aaa;
font-size:13px;
margin-top:10px;
}

footer{
margin-top:40px;
padding:15px;
background:#111;
color:#777;
font-size:13px;
}

</style>

<script>

function buy(){

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:"TXrVXk2ftGzdh1ynBCWsYyKbJaj4dNxGpk",
width:200,
height:200
});

document.getElementById("addr").innerText=
"Send USDT to: TXrVXk2ftGzdh1ynBCWsYyKbJaj4dNxGpk";

}

function sell(){

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:"ARW7yYqW7haQREWNT4Si2gunSqSq1QvbzQ2pkxjjFsmPcwpuW4T3f",
width:200,
height:200
});

document.getElementById("addr").innerText=
"Send ARI to: ARW7yYqW7haQREWNT4Si2gunSqSq1QvbzQ2pkxjjFsmPcwpuW4T3f";

}

function copyAddr(){

var text=document.getElementById("addr").innerText;

navigator.clipboard.writeText(text);

alert("Address copied");

}

</script>

</head>

<body>

<header>
AriTrade Exchange
</header>

<div class="container">

<h2>Buy & Sell ARI Coin</h2>

<div class="box">

<p>Current Price</p>
<h3>1 ARI = ₹5</h3>

<p class="notice">Secure QR Payment System</p>

</div>

<button class="buy" onclick="buy()">BUY ARI</button>
<button class="sell" onclick="sell()">SELL ARI</button>

<div id="qrcode"></div>

<p id="addr"></p>

<button class="copy" onclick="copyAddr()">Copy Address</button>

</div>

<div class="box">

<h3>Order Form</h3>

<form action="mailto:sandeepkarna71@gmail.com" method="post" enctype="text/plain">

<input name="Name" placeholder="Your Name" required><br>

<input name="Email" placeholder="Email Address" required><br>

<input name="ARI Amount" placeholder="ARI Amount" required><br>

<input name="Transaction ID" placeholder="Transaction ID" required><br>

<button type="submit" class="buy">Submit Order</button>

</form>

<p class="notice">
After payment submit order with transaction ID.
</p>

</div>

<footer>

© 2026 AriTrade Exchange  
Secure ARI Coin Trading Platform

</footer>

</body>
</html>
